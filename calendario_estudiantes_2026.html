<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Calendario Estudiantes · Talleres Mecánica 2026</title>
<style>
:root{
  --bg:#f5f5f5;--bg2:#ffffff;--bg3:#eeeeee;
  --border:#e0e0e0;--border2:#cccccc;
  --text:#111111;--text2:#555555;--text3:#999999;
  --cnc:#c47d1a;--cnc-bg:#fdf4e3;--cnc-text:#a0600f;
  --met:#3a7fc1;--met-bg:#e8f2fb;--met-text:#2a5a8a;
  --man:#2e9e60;--man-bg:#e8f8ef;--man-text:#1e6b40;
  --tar:#c94040;--tar-bg:#faeaea;--tar-text:#8b2a2a;
  --r:14px;--r-sm:10px;
  --xs:11px;--sm:13px;--md:15px;--lg:20px;--xl:28px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#262626;
    --border:#2e2e2e;--border2:#3d3d3d;
    --text:#f2f2f2;--text2:#a0a0a0;--text3:#666666;
    --cnc:#e09a3a;--cnc-bg:#2a1e08;--cnc-text:#f0b95a;
    --met:#5a9fd4;--met-bg:#0c1e30;--met-text:#7db8e8;
    --man:#4ab87a;--man-bg:#0a1f12;--man-text:#6dd49a;
    --tar:#e06060;--tar-bg:#200c0c;--tar-text:#f08080;
  }
  .hdr{background:rgba(15,15,15,.92)!important}
  .card,.proxima-card,.info-card,.clase-card{box-shadow:none!important}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
.screen{display:none}.screen.active{display:block}
/* HERO */
.hero{background:var(--bg2);border-bottom:1px solid var(--border);padding:64px 28px 44px}
.eyebrow{font-size:var(--xs);font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
.hero-title{font-size:var(--xl);font-weight:800;line-height:1.2;color:var(--text);margin-bottom:12px}
.hero-sub{font-size:var(--sm);color:var(--text2);line-height:1.65}
.hero-body{padding:36px 28px 100px}
/* GRID SELECTOR */
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.sel-label{font-size:var(--xs);font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin:32px 0 12px}
.sel-label:first-child{margin-top:0}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;cursor:pointer;transition:transform .15s,box-shadow .2s,border-color .2s;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 3px rgba(0,0,0,.05);position:relative;overflow:hidden}
.card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(0,0,0,.09);transform:translateY(-2px)}
.card:active{transform:scale(.97);box-shadow:none}
.card-stripe{position:absolute;top:0;left:0;right:0;height:4px;border-radius:18px 18px 0 0;background:var(--border)}
.card-body{padding:28px 20px 24px}
.card-label{font-size:var(--xs);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.card-title{font-size:var(--md);font-weight:800;color:var(--text);line-height:1.2;margin-bottom:3px}
.card-sub{font-size:var(--xs);font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(245,245,245,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;height:62px;padding:0 24px}
.back-btn{width:36px;height:36px;flex-shrink:0;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s;font-family:inherit}
.back-btn:hover{background:var(--border)}
.hdr-info{flex:1;min-width:0}
.hdr-name{font-size:var(--sm);font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.04em}
.hdr-sub{font-size:var(--xs);color:var(--text3);margin-top:2px;font-weight:600}
/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:16px 18px 14px;font-size:var(--xs);font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;transition:color .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:var(--text);border-bottom-color:var(--border2)}
.tab-btn.t-man.active{color:var(--man);border-bottom-color:var(--man)}
.tab-btn.t-tar.active{color:var(--tar);border-bottom-color:var(--tar)}
.tab-pane{display:none;padding:28px 24px 100px}.tab-pane.active{display:block}
/* SECTION LABEL */
.sec-label{font-size:var(--xs);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
/* HOY */
.hoy-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:36px}
.hoy-card{border-radius:18px;padding:26px 24px 22px;border:1px solid transparent}
.hoy-card.cnc{background:var(--cnc-bg);border-color:rgba(196,125,26,.15)}
.hoy-card.met{background:var(--met-bg);border-color:rgba(58,127,193,.15)}
.hoy-card.none{background:var(--bg2);border-color:var(--border)}
.hoy-turno{font-size:var(--xs);font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.hoy-card.none .hoy-turno{color:var(--text3)}
.hoy-mat{font-size:var(--lg);font-weight:800;line-height:1.25;text-transform:uppercase;margin-bottom:8px}
.hoy-card.none .hoy-mat{color:var(--text3)}
.hoy-prof{font-size:var(--sm);color:var(--text2);font-weight:500}
.hoy-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.hoy-tag{padding:5px 13px;border-radius:100px;font-size:var(--xs);font-weight:700;background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
/* PROXIMAS */
.prox-section{margin-bottom:36px}
.proxima-card{display:flex;align-items:center;gap:16px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.prox-fecha{font-size:var(--xs);font-weight:700;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.1em}
.prox-mat{font-size:var(--sm);font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.02em;line-height:1.3}
/* LISTA CLASES */
.month-block{margin-bottom:32px}
.month-title{font-size:var(--xs);font-weight:800;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.clase-card{display:flex;align-items:center;gap:16px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px 18px 15px 20px;margin-bottom:8px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .15s,transform .15s}
.clase-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.clase-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.clase-card.cnc::before{background:var(--cnc)}.clase-card.met::before{background:var(--met)}
.clase-date{min-width:52px;flex-shrink:0}
.clase-dow{font-size:var(--xs);font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.clase-day{font-size:var(--xl);font-weight:800;color:var(--text);line-height:1;letter-spacing:-.02em}
.clase-sep{width:1px;height:36px;background:var(--border);flex-shrink:0}
.clase-info{flex:1;min-width:0}
.clase-mat{font-size:var(--sm);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.02em;line-height:1.3}
.clase-tags{display:flex;flex-wrap:wrap;gap:6px}
.ctag{padding:3px 10px;border-radius:100px;font-size:var(--xs);font-weight:700;background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
/* INFO */
.info-block{margin-bottom:28px}
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.irow{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;border-bottom:1px solid var(--border);gap:12px}
.irow:last-child{border-bottom:none}
.irow-l{font-size:var(--xs);font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;flex-shrink:0}
.irow-v{font-size:var(--sm);font-weight:600;color:var(--text);text-align:right;line-height:1.4}
.icard-head{display:flex;align-items:center;gap:14px;padding:20px 20px 12px}
.icard-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.icard-title{font-size:var(--xs);font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.07em}
.icard-sub{font-size:var(--sm);color:var(--text3);margin-top:3px}
.icard-body{padding:0 20px 20px;font-size:var(--sm);color:var(--text2);line-height:1.65}
.empty-msg{font-size:var(--md);color:var(--text3);padding:48px 0;text-align:center;font-weight:600}

@media(min-width:768px){
  .hero{padding:96px 64px 56px}
  .hero-title{font-size:calc(var(--xl)*1.55)}
  .hero-sub{font-size:var(--md)}
  .hero-body{padding:48px 64px 100px;max-width:1100px}
  .sel-label{margin:44px 0 16px}
  .sel-grid{gap:16px}
  .hdr{padding:0 48px;height:68px}
  .tabs{padding:0 48px}
  .tab-btn{padding:18px 22px 16px}
  .tab-pane{padding:40px 48px 100px;max-width:1100px}
  .hoy-grid{flex-direction:row;gap:16px}
  .hoy-grid>.hoy-card{flex:1}
  .prox-section{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .prox-section .sec-label{grid-column:1/-1;margin-bottom:0}
  .proxima-card{margin-bottom:0}
  .cal-cols{column-count:2;column-gap:40px}
  .cal-cols .month-block{break-inside:avoid}
  .info-two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .info-two-col .info-block{margin-bottom:0}
}
</style>
</head>

  return (MORNING_CAL[div+'_'+grp]||[]).map(e=>({date:new Date(e.date+'T00:00:00'),type:e.type,gym:e.gym,rec:false,originalDate:null}));

function renderGroups(){
  let h='';
  for(let div=1;div<=3;div++){
    h+=`<div class="sel-label">4° ${DIV_LABEL[div]}</div><div class="sel-grid">`;
    for(let grp=1;grp<=4;grp++){
      h+=`<div class="card" onclick="selectGroup(${div},${grp})">
        <div class="card-stripe"></div>
        <div class="card-body"><div class="card-title">GRUPO ${grp}</div></div>
      </div>`;
    }
    h+='</div>';
  }
  document.getElementById('groups-container').innerHTML=h;
}

function selectGroup(div,grp){
  const mDays=buildMorning(div,grp);
  const aDays=buildAfternoon(div,grp);
  document.getElementById('hdr-name').textContent=`4° ${DIV_LABEL[div]} · Grupo ${grp}`;
  document.getElementById('hdr-sub').innerHTML='';
  renderHoy(div,grp,mDays,aDays);
  renderCal('tab-man',mDays,'manana');
  renderCal('tab-tar',aDays,'tarde');
  renderInfo(div,grp);
  switchTab('hoy');
  document.getElementById('s-sel').classList.remove('active');
  document.getElementById('s-grp').classList.add('active');
  window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('s-grp').classList.remove('active');
  document.getElementById('s-sel').classList.add('active');
  window.scrollTo(0,0);
}

function switchTab(name){
  const names=['hoy','man','tar','info'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  window.scrollTo(0,0);
}

function renderHoy(div,grp,mDays,aDays){
  const today=new Date();today.setHours(0,0,0,0);
  const tM=mDays.find(d=>sameDay(d.date,today));
  const tA=aDays.find(d=>sameDay(d.date,today));
  const nM=mDays.find(d=>d.date>today);
  const nA=aDays.find(d=>d.date>today);
  const todayStr=`${DAYS_L[today.getDay()]} ${today.getDate()} de ${MONTHS[today.getMonth()]}`.toUpperCase();
  function hoyCard(cl,turno,profs,tc){
    if(!cl) return `<div class="hoy-card none"><div class="hoy-turno" style="color:${tc}">${turno}</div><div class="hoy-mat">SIN CLASE HOY</div></div>`;
    let tags='';
    if(cl.gym) tags+=`<span class="hoy-tag">RETIRO 11:45 HS</span>`;
    if(cl.rec) tags+=`<span class="hoy-tag">CLASE DE RECUPERACIÓN</span>`;
    return `<div class="hoy-card ${cl.type}">
      <div class="hoy-turno" style="color:${tc}">${turno}</div>
      <div class="hoy-mat" style="color:var(--${cl.type}-text)">${MAT[cl.type]}</div>
      <div class="hoy-prof">${profs[cl.type]}</div>
      ${tags?`<div class="hoy-tags">${tags}</div>`:''}
    </div>`;
  }
  function nextCard(cl,turno,tc){
    if(!cl) return '';
    const col=cl.type==='cnc'?'var(--cnc)':'var(--met)';
    const ds=`${DAYS_S[cl.date.getDay()]} ${cl.date.getDate()} ${MONTHS[cl.date.getMonth()]}`;
    return `<div class="proxima-card"><div>
      <div class="prox-fecha">${ds}</div>
      <div class="prox-mat"><span style="color:${tc}">${turno}</span> · <span style="color:${col}">${MAT[cl.type]}</span></div>
    </div></div>`;
  }
  let h=`<div class="sec-label">${todayStr}</div>
    <div class="hoy-grid">
      ${hoyCard(tM,'TURNO MAÑANA',PROFS.manana,'var(--man)')}
      ${hoyCard(tA,'TURNO TARDE',PROFS.tarde,'var(--tar)')}
    </div>`;
  if(nM||nA){
    const px=[];
    if(nM) px.push({cl:nM,t:'TURNO MAÑANA',c:'var(--man)'});
    if(nA) px.push({cl:nA,t:'TURNO TARDE',c:'var(--tar)'});
    px.sort((a,b)=>a.cl.date-b.cl.date);
    h+=`<div class="prox-section"><div class="sec-label">PRÓXIMAS CLASES</div>${px.map(p=>nextCard(p.cl,p.t,p.c)).join('')}</div>`;
  }
  document.getElementById('tab-hoy').innerHTML=h;
}

function renderCal(tabId,days,turno){
  if(!days.length){document.getElementById(tabId).innerHTML='<div class="empty-msg">No hay clases programadas.</div>';return;}
  const byM={};
  days.forEach(d=>{const k=d.date.getMonth();if(!byM[k])byM[k]=[];byM[k].push(d);});
  const months=Object.keys(byM).map(Number).sort((a,b)=>a-b);
  let h='<div class="cal-cols">';
  months.forEach(m=>{
    h+=`<div class="month-block"><div class="month-title">${MONTHS[m].toUpperCase()}</div>`;
    byM[m].forEach(d=>{
      let tags='';
      if(d.gym) tags+=`<span class="ctag">RETIRO 11:45 HS</span>`;
      if(d.rec) tags+=`<span class="ctag">RECUPERACIÓN</span>`;
      h+=`<div class="clase-card ${d.type}">
        <div class="clase-date"><div class="clase-dow">${DAYS_S[d.date.getDay()]}</div><div class="clase-day">${d.date.getDate()}</div></div>
        <div class="clase-sep"></div>
        <div class="clase-info"><div class="clase-mat" style="color:var(--${d.type})">${MAT[d.type]}</div>${tags?`<div class="clase-tags">${tags}</div>`:''}</div>
      </div>`;
    });
    h+='</div>';
  });
  h+='</div>';
  document.getElementById(tabId).innerHTML=h;
}
